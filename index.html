<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATS Resume Builder Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--primary:#2563eb;
--primary-dark:#1d4ed8;
--success:#16a34a;
--danger:#dc2626;
--text:#1e293b;
--bg:#f1f5f9;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Cairo',sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.header{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
}

.header h1{color:var(--primary);}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.panel{
background:white;
padding:20px;
border-radius:15px;
}

.section-title{
margin:15px 0;
font-weight:700;
color:var(--primary);
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.btn-primary{background:var(--primary);color:white;}
.btn-success{background:var(--success);color:white;}
.btn-secondary{background:#64748b;color:white;}

.repeater-item{
background:#f8fafc;
padding:10px;
margin:10px 0;
border-radius:10px;
position:relative;
}

.remove-btn{
position:absolute;
top:5px;
left:5px;
background:var(--danger);
color:white;
border:none;
padding:5px;
border-radius:5px;
cursor:pointer;
}

.preview-panel{
background:white;
padding:20px;
border-radius:15px;
}

/* CV */

.cv{font-family:Arial;color:#000;}

.cv-name{font-size:24px;font-weight:bold;text-align:center;}
.cv-title{text-align:center;}
.cv-contact{text-align:center;font-size:12px;}

.cv-section-title{
margin-top:15px;
font-weight:bold;
border-bottom:1px solid #000;
}

.hidden{display:none;}

@media(max-width:900px){
.grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>ATS Resume Builder Pro</h1>
</div>

<div class="grid">

<!-- FORM -->
<div class="panel">

<div class="section-title">البيانات</div>

<input id="fullName" placeholder="الاسم">
<input id="jobTitle" placeholder="المسمى الوظيفي">
<input id="email" placeholder="البريد">
<input id="phone" placeholder="الهاتف">
<input id="location" placeholder="الموقع">

<div class="section-title">الملخص</div>
<textarea id="summary"></textarea>

<div class="section-title">المهارات</div>
<input id="skills">

<div class="section-title">اللغات</div>
<input id="languages">

<div class="section-title">التعليم</div>
<div id="edu"></div>
<button class="btn-primary" type="button" onclick="addEdu()">+ تعليم</button>

<div class="section-title">الخبرة</div>
<div id="exp"></div>
<button class="btn-primary" type="button" onclick="addExp()">+ خبرة</button>

<br><br>

<button class="btn-success" onclick="generate()">إنشاء CV</button>
<button class="btn-secondary" onclick="save()">حفظ</button>
<button class="btn-secondary" onclick="load()">استرجاع</button>
<button class="btn-primary" onclick="pdf()">PDF</button>

<div id="score">ATS: 0%</div>

</div>

<!-- PREVIEW -->
<div class="preview-panel">

<div id="printArea">

<div id="cv" class="cv">

<div class="cv-name">NAME</div>
<div class="cv-title">TITLE</div>
<div class="cv-contact">EMAIL | PHONE | LOCATION</div>

</div>

</div>

</div>

</div>
</div>

<script>

/* EDU */
function addEdu(){
document.getElementById("edu").innerHTML += `
<div class="repeater-item">
<input class="degree" placeholder="degree">
<input class="year" placeholder="year">
<button class="remove-btn" onclick="this.parentElement.remove()">X</button>
</div>`;
}

/* EXP */
function addExp(){
document.getElementById("exp").innerHTML += `
<div class="repeater-item">
<input class="company" placeholder="company">
<input class="position" placeholder="position">
<textarea class="resp"></textarea>
<button class="remove-btn" onclick="this.parentElement.remove()">X</button>
</div>`;
}

/* GENERATE */
function generate(){

let name=document.getElementById("fullName").value;
let title=document.getElementById("jobTitle").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let location=document.getElementById("location").value;

let html=`<div class='cv-name'>${name}</div>
<div class='cv-title'>${title}</div>
<div class='cv-contact'>${email} | ${phone} | ${location}</div>`;

/* EDU */
html+=`<div class='cv-section-title'>Education</div>`;
document.querySelectorAll(".degree").forEach((d,i)=>{
let y=document.querySelectorAll(".year")[i].value;
html+=`<div>${d.value} - ${y}</div>`;
});

/* EXP */
html+=`<div class='cv-section-title'>Experience</div>`;
document.querySelectorAll(".company").forEach((c,i)=>{
let p=document.querySelectorAll(".position")[i].value;
let r=document.querySelectorAll(".resp")[i].value;
html+=`<div><b>${p}</b> - ${c.value}<br>${r}</div>`;
});

document.getElementById("cv").innerHTML=html;

/* ATS SCORE */
let score=0;
if(name.length>3)score+=20;
if(title.length>3)score+=20;
if(document.querySelectorAll(".degree").length>0)score+=20;
if(document.querySelectorAll(".company").length>0)score+=20;
if(document.getElementById("summary").value.length>50)score+=20;

document.getElementById("score").innerText="ATS: "+score+"%";
}

/* SAVE */
function save(){
localStorage.setItem("cv",document.body.innerHTML);
alert("saved");
}

/* LOAD */
function load(){
let data=localStorage.getItem("cv");
if(data)document.body.innerHTML=data;
}

/* PDF */
async function pdf(){
const el=document.getElementById("printArea");
const canvas=await html2canvas(el);
const img=canvas.toDataURL("image/png");
const {jsPDF}=window.jspdf;
const pdf=new jsPDF();
pdf.addImage(img,"PNG",0,0,210,297);
pdf.save("cv.pdf");
}

</script>

</body>
</html>
